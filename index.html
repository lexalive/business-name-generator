<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Generate fresh, modern business name ideas instantly with this AI-powered business name generator.">
    <meta name="keywords" content="business name generator, AI business names, startup naming tool, company name ideas">
    <meta name="author" content="Your Name">
    <title>NameKindle | AI Business Name Generator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="apple-touch-icon" href="favicon.svg">
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
    <div class="app-shell">
        <div class="hero">
            <p class="eyebrow">AI-powered naming</p>
<h1>NameKindle</h1>
<p class="subtitle">Create unique business names, brand ideas, and more in seconds.</p>
        </div>

        <div class="input-panel">
            <div class="field-group">
                <label for="idea" class="sr-only">Describe your idea</label>
                <input type="text" id="idea" name="idea" placeholder="Enter a keyword (example: coffee)">
            </div>
            <button id="generateButton" type="button">Generate Names</button>
        </div>

        <h2>Your Business Name Ideas</h2>
        <div id="results" class="results" aria-live="polite"></div>

        <p class="examples">
            Not finding the perfect name? Try another keyword like
            <strong>fitness</strong>,
            <strong>bakery</strong>,
            <strong>tech</strong>,
            <strong>travel</strong>, or
            <strong>fashion</strong>.
        </p>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="script.js"></script>
</body>
</html>
